<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Matrix 3x3 Random Bit</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
    text-align:center;
    padding-top:60px;
    margin:0;
}

h2{
    margin-bottom:40px;
}

.matrix{
    display:grid;
    grid-template-columns:repeat(3,90px);
    gap:25px;
    justify-content:center;
    margin-bottom:50px;
}

.cell{
    height:90px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    transition:0.2s;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.cell:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #00ffff;
}

.result{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:30px;
}

.bitbox{
    width:60px;
    height:60px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    background: red;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.running{
    box-shadow:0 0 25px #00ffff;
}

.flash{
    animation:flash 0.4s ease-in-out 6;
    background:linear-gradient(45deg,#ff00cc,#3333ff);
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.5; transform:scale(1.08);}
    100%{opacity:1;}
}

.result-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
    gap:15px;
}

.number-display{
    width:80px;
    height:60px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(45deg,#ff512f,#f09819);
    color:white;
    box-shadow:0 0 20px rgba(255,150,0,0.8);
    animation:blink 1.5s infinite ease-in-out;
}

@keyframes blink{
    0%{opacity:1; transform:scale(1);}
    50%{opacity:0.6; transform:scale(1.05);}
    100%{opacity:1; transform:scale(1);}
}
</style>
</head>





<body>

<h2>Ma Trận Random 5 Bit</h2>
<div id="result"></div>

<div class="matrix" id="matrix"></div>
<audio id="spinSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/casino-slot-machine-01.mp3" type="audio/mpeg">
</audio>







<script>

const matrix = document.getElementById("matrix");
const result = document.getElementById("result");
const spinSound = document.getElementById("spinSound");

const BIT_COUNT = 5;
const SPIN_DURATION = 3000;

spinSound.loop = true;

/* ===== TẠO MA TRẬN 0 → 9 ===== */
for(let i = 0; i <= 9; i++){
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = i;
    cell.addEventListener("click", () => spin(i));
    matrix.appendChild(cell);
}

/* ===== HÀM SHUFFLE ===== */
function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}






/* ===== SINH BIT THEO SỐ BẤM ===== */
function generateBits(number){

const bitPatterns = {

0:["00000","00000","00000","00000","00000"],
1:["01101","10010","01011","10100","00111"],
2:["00001","01000","00100","10000","00010"],
3:["11100","11010","10110","01110","11001"],
4:["00011","00101","01001","10001","00110"],
5:["11100","11010","10110","01110","11001"],
6:["10101","11001","01101","10011","01011"],
7:["11101","11011","10111","01111","11110"],
8:["11001","10101","01101","10011","01011"],
9:["00011","00101","01001","10001","00110"]

};

const patterns = bitPatterns[number];

const randomPattern = patterns[Math.floor(Math.random()*patterns.length)];

return randomPattern.split("");

}





/* ===== HIỆU ỨNG QUAY ===== */
function spin(number){

    result.innerHTML = "";

    spinSound.currentTime = 0;
    spinSound.play().catch(()=>{});

    const wrapper = document.createElement("div");
    wrapper.className = "result-wrapper";
    result.appendChild(wrapper);

    const numberBox = document.createElement("div");
    numberBox.className = "number-display";
    numberBox.textContent = number;
    wrapper.appendChild(numberBox);

    const bitRow = document.createElement("div");
    bitRow.className = "result";
    wrapper.appendChild(bitRow);

    const bitBoxes = [];

    for(let i = 0; i < BIT_COUNT; i++){
        const box = document.createElement("div");
        box.className = "bitbox running";
        bitRow.appendChild(box);
        bitBoxes.push(box);
    }

    let startTime = null;

    function animate(timestamp){

        if(!startTime) startTime = timestamp;

        const progress = timestamp - startTime;
        const percent = Math.min(progress / SPIN_DURATION, 1);

        const interval = 30 + (200 * percent);

        if(progress % interval < 20){
            const bits = generateBits(number);
            bitBoxes.forEach((box, index)=>{
                box.textContent = bits[index];
            });
        }

        if(progress < SPIN_DURATION){
            requestAnimationFrame(animate);
        }
        else{
            bitBoxes.forEach(box=>{
                box.classList.remove("running");
                box.classList.add("flash");
            });

            spinSound.pause();
            spinSound.currentTime = 0;
        }
    }

    requestAnimationFrame(animate);
}

</script>
</body>
</html>

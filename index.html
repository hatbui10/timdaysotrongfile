<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Matrix 3x3 A/B Random</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
        color: white;
        text-align: center;
        padding-top: 40px;
        margin: 0;
    }

    h2 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

    /* Nút Random chính */
    .btn-random {
        padding: 15px 50px;
        font-size: 20px;
        font-weight: bold;
        color: white;
        background: linear-gradient(45deg, #00f2fe, #4facfe);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        transition: 0.3s;
        margin-bottom: 40px;
        text-transform: uppercase;
    }

    .btn-random:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px #00f2fe;
    }

    .btn-random:active { transform: scale(0.95); }

    /* Lưới ma trận 3x3 */
    .matrix {
        display: grid;
        grid-template-columns: repeat(3, 110px); /* 3 cột dọc */
        grid-template-rows: repeat(3, 110px);    /* 3 hàng ngang */
        gap: 20px;
        justify-content: center;
        margin-bottom: 50px;
    }

    .cell {
        height: 110px;
        width: 110px;
        border-radius: 15px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 45px;
        font-weight: bold;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    /* Số nhỏ cố định phía trên (1-9) */
    .cell-number {
        position: absolute;
        top: 10px;
        left: 12px;
        font-size: 30px;
        color: yellow;
        font-weight: normal;
    }

    /* Nội dung A hoặc B */
    .cell-content {
        color: #ff00ff;
        text-shadow: 0 0 15px #ff00ff;
    }

    /* Hiệu ứng khi đang chạy random */
    .spinning {
        border-color: #00f2fe;
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        animation: pulse 0.1s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }
</style>
</head>

<body>

<h2>Ma Trận 3x3</h2>

<button class="btn-random" onclick="rollMatrix()">BẮT ĐẦU</button>

<div class="matrix" id="matrix"></div>

<audio id="spinSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/button-37.mp3" type="audio/mpeg">
</audio>

<script>
    const matrixContainer = document.getElementById("matrix");
    const spinSound = document.getElementById("spinSound");
    const cellDisplays = [];

    // Tạo ma trận 3x3 (9 ô, đánh số từ 1-9)
    for (let i = 1; i <= 9; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        
        const numLabel = document.createElement("span");
        numLabel.className = "cell-number";
        numLabel.textContent = i;
        
        const content = document.createElement("span");
        content.className = "cell-content";
        content.textContent = "?"; 
        
        cell.appendChild(numLabel);
        cell.appendChild(content);
        matrixContainer.appendChild(cell);
        
        cellDisplays.push({
            container: cell,
            text: content
        });
    }

    // Hàm xáo trộn mảng để vị trí ngẫu nhiên
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function rollMatrix() {
        spinSound.currentTime = 0;
        spinSound.play().catch(() => {});

        // 1. Logic khống chế: Tạo mảng chứa tối đa 6A hoặc 6B
        // Random số lượng A từ 3 đến 6 (Để B cũng tự động từ 3 đến 6)
        const countA = Math.floor(Math.random() * 4) + 3; 
        const countB = 9 - countA;
        
        let finalResults = [];
        for(let i=0; i<countA; i++) finalResults.push("A");
        for(let i=0; i<countB; i++) finalResults.push("b");
        
        // Trộn vị trí
        shuffleArray(finalResults);

        cellDisplays.forEach((item, index) => {
            let iterations = 0;
            const maxIterations = 15 + Math.floor(Math.random() * 10); 

            item.container.classList.add("spinning");

            const interval = setInterval(() => {
                // Hiệu ứng nhảy chữ ngẫu nhiên lúc đang quay
                item.text.textContent = Math.random() > 0.5 ? "A" : "B";
                iterations++;

                if (iterations >= maxIterations) {
                    clearInterval(interval);
                    item.container.classList.remove("spinning");
                    
                    // Gán kết quả thực tế từ mảng đã khống chế
                    const finalChar = finalResults[index];
                    item.text.textContent = finalChar;
                    
                    // Đổi màu theo chữ cái cuối cùng
                    if(finalChar === "A") {
                        item.text.style.color = "#00ffff";
                        item.text.style.textShadow = "0 0 15px #00ffff";
                    } else {
                        item.text.style.color = "#ff00ff";
                        item.text.style.textShadow = "0 0 15px #ff00ff";
                    }
                }
            }, 60);
        });
    }
</script>

</body>
</html>

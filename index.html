<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Matrix 3x3 1%  3%  9%   27%   81%</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        /* Nền tối sâu cho toàn bộ trang */
        background: linear-gradient(135deg, #050509, #1a1625, #0a0a0f);
        color: white;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh; /* Căn giữa theo chiều dọc trang */
        margin: 20px;
        padding: 20px;
    }

    /* Chiếc hộp chứa toàn bộ nội dung */
    .main-container {
        background: rgba(20, 20, 30, 0.6); /* Nền hộp hơi tối */
        padding: 50px 60px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05); /* Viền mờ */
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); /* Đổ bóng cho hộp */
        backdrop-filter: blur(10px); /* Hiệu ứng làm mờ nền phía sau hộp */
    }

    h2 { 
        margin-top: 0;
        margin-bottom: 25px; 
        text-transform: uppercase; 
        letter-spacing: 3px; 
        color: rgba(255, 255, 255, 0.9);
    }

    /* Đồng hồ đếm ngược */
    #timer-display {
        font-size: 60px;
        font-weight: bold;
        color: #00f2fe;
        margin-bottom: 15px;
        text-shadow: 0 0 20px rgba(0, 242, 254, 0.8);
    }

    /* Nút Random chính */
    .btn-random {
        padding: 18px 60px;
        font-size: 22px;
        font-weight: bold;
        color: yellow;
        background: linear-gradient(45deg, #ff0000, #4facfe);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 25px rgba(127, 0, 255, 0.5);
        transition: 0.3s;
        margin-bottom: 50px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-random:hover {
        transform: scale(1.05);
        box-shadow: 0 0 35px #00f2fe;
    }

    .btn-random:active { transform: scale(0.95); }

    /* Lưới ma trận 3x3 */
    .matrix {
        display: grid;
        grid-template-columns: repeat(3, 95px); 
        grid-template-rows: repeat(3, 95px);    
        gap: 15px;
        justify-content: center;
    }

    .cell {
        height: 95px;
        width: 95px;
        border-radius: 20px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        font-weight: bold;
        /* Nền phím tối hơn để nổi bật chữ */
        background: rgba(0, 0, 0, 0.3); 
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
        transition: 0.3s;
    }

    /* Số nhỏ cố định phía trên (1-9) */
    .cell-number {
        position: absolute;
        top: 2px;
        left: 5px;
        font-size: 25px;
        color: rgba(255, 255, 0, 0.8); /* Màu vàng mờ */
        font-weight: normal;
    }

    /* Nội dung A hoặc b */
    .cell-content {
        /* Màu mặc định là trắng mờ */
        color: rgba(255, 255, 255, 0.3);
        text-shadow: none;
        transition: 0.3s ease;
    }

    /* Hiệu ứng khi đang chạy random */
    .spinning {
        border-color: #00f2fe;
        box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
        animation: pulse 0.1s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
    }
</style>
</head>

<body>

    <div class="main-container">
        <h2>Matrix 3x3 </h2>
        <h2>Phạm vi mục tiêu </h2>
        <h2> 1% - 3% - 9% - 27% - 81%</h2>

        <div id="timer-display">05:00</div>

        <button class="btn-random" id="mainButton" onclick="handleButtonClick()">BẮT ĐẦU</button>

        <div class="matrix" id="matrix">
            </div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/button-37.mp3" type="audio/mpeg">
    </audio>

<script>
    const matrixContainer = document.getElementById("matrix");
    const spinSound = document.getElementById("spinSound");
    const timerDisplay = document.getElementById("timer-display");
    const mainButton = document.getElementById("mainButton");
    const cellDisplays = [];

    let timeLeft = 300; // 300 giây
    let timerInterval = null;
    let isStarted = false;

    // Tạo ma trận 3x3 (9 ô, đánh số từ 1-9)
    for (let i = 1; i <= 9; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        
        const numLabel = document.createElement("span");
        numLabel.className = "cell-number";
        numLabel.textContent = i;
        
        const content = document.createElement("span");
        content.className = "cell-content";
        content.textContent = "?"; 
        
        cell.appendChild(numLabel);
        cell.appendChild(content);
        matrixContainer.appendChild(cell);
        
        cellDisplays.push({
            container: cell,
            text: content
        });
    }

    // Hàm xáo trộn mảng để vị trí ngẫu nhiên
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Hàm xử lý khi bấm nút lần đầu tiên
    function handleButtonClick() {
        if (!isStarted) {
            isStarted = true;
            
            // 1. Chạy Random ngay lập tức lần đầu
            rollMatrix();
            
            // 2. Bắt đầu đếm ngược
            startCountdown();
            
            // 3. Cập nhật giao diện nút bấm
            mainButton.textContent = "HỆ THỐNG ĐANG CHẠY";
            mainButton.disabled = true;
            mainButton.style.opacity = "0.5";
            mainButton.style.cursor = "default";
            mainButton.style.transform = "scale(1)";
        }
    }

    // Hàm bắt đầu đếm ngược 300s
    function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            
            if (timeLeft < 0) {
                // Khi hết thời gian: Thực hiện Random vòng mới
                rollMatrix();
                // Reset thời gian về 300s
                timeLeft = 300;
            }
            
            updateTimerDisplay();
        }, 1000);
    }

    // Cập nhật hiển thị đồng hồ dạng MM:SS
    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // Hàm thực hiện hiệu ứng quay và gán kết quả
    function rollMatrix() {
        // Phát âm thanh
        spinSound.currentTime = 0;
        spinSound.play().catch(() => {});

        // Logic khống chế: Tạo mảng chứa tối đa 6A hoặc 6b
        // Random số lượng A từ 3 đến 6 (Để b cũng tự động từ 3 đến 6)
        const countA = Math.floor(Math.random() * 4) + 3; 
        const countB = 9 - countA;
        
        let finalResults = [];
        for(let i=0; i<countA; i++) finalResults.push("A");
        for(let i=0; i<countB; i++) finalResults.push("b");
        
        // Trộn vị trí
        shuffleArray(finalResults);

        cellDisplays.forEach((item, index) => {
            let iterations = 0;
            // Số lần nhảy chữ trước khi dừng
            const maxIterations = 20 + Math.floor(Math.random() * 10); 

            // Thêm hiệu ứng quay cho ô
            item.container.classList.add("spinning");
            // Reset màu chữ mặc định khi bắt đầu quay
            item.text.style.color = "rgba(255, 255, 255, 0.3)";
            item.text.style.textShadow = "none";

            const interval = setInterval(() => {
                // Hiệu ứng nhảy chữ ngẫu nhiên lúc đang quay
                item.text.textContent = Math.random() > 0.5 ? "A" : "b";
                iterations++;

                if (iterations >= maxIterations) {
                    clearInterval(interval);
                    // Xóa hiệu ứng quay
                    item.container.classList.remove("spinning");
                    
                    // Gán kết quả thực tế từ mảng đã khống chế
                    const finalChar = finalResults[index];
                    item.text.textContent = finalChar;
                    
                    // Đổi màu và hiệu ứng bóng đổ theo chữ cái cuối cùng
                    if(finalChar === "A") {
                        item.text.style.color = "#00ffff"; // Xanh Cyan neon
                        item.text.style.textShadow = "0 0 15px #00ffff, 0 0 25px #00ffff";
                    } else {
                        item.text.style.color = "#ff00ff"; // Hồng neon
                        item.text.style.textShadow = "0 0 15px #ff00ff, 0 0 25px #ff00ff";
                    }
                }
            }, 50); // Tốc độ nhảy chữ (50ms)
        });
    }
</script>

</body>
</html>
